cud_research.index:
  path: '/research'
  defaults:
    _controller: 'Drupal\cud_research\Controller\ResearchController::index'
    _title: 'Research Overview'
  requirements:
    _permission: 'access content'

cud_research.search:
  path: '/research/search'
  defaults:
    _controller: 'Drupal\cud_research\Controller\ResearchController::search'
    _title: 'Research Search'
  requirements:
    _permission: 'access content'

cud_research.sub_pages:
  path: '/research/{slug}'
  defaults:
    _controller: 'Drupal\cud_research\Controller\ResearchController::renderPage'
  requirements:
    _permission: 'access content'
    slug: '.+'
  options:
    parameters:
      slug:
        type: string

cud_research.settings:
  path: '/admin/config/content/cud-research'
  defaults:
    _form: 'Drupal\cud_research\Form\CudResearchSettingsForm'
    _title: 'CUD Research settings'
  requirements:
    _permission: 'administer site configuration'
  options:
    _admin_route: TRUE
